name: UX-Test (GitHub Pages)

# Builds the Vela app and publishes it to GitHub Pages so the branch can be
# tested on a phone. The real AI (chart compute + German interpretation +
# transits) runs against the Supabase edge functions, which work from any
# origin. The Claude Q&A (/api/ask) is Vercel-only, so on Pages it falls back
# to the local offline oracle.

on:
  push:
    branches: [claude/vela-design-impl-nbuip2]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: GHPAGES=1 npm run build
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
